name: Deploy Infrastructure

# EDIT ONLY THIS LINE
env:
  TARGET_BRANCH: strawdrive  # Switch to 'hello-world', 'CRUD', 'auth', or 'strawdrive' as needed.
  AWS_REGION: ap-southeast-2
  TF_VERSION: 1.6.6
  PYTHON_VERSION: "3.12"

on:
  push:
    # EDIT THIS to match TARGET_BRANCH above
    branches: ["strawdrive"]
  pull_request:
    branches: ["strawdrive"]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploying ${{ github.ref_name }}
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Lambda dependencies
        run: |
          LAMBDA_DIR="lambda/serverless_web_app"
          if [ -f "$LAMBDA_DIR/requirements.txt" ]; then
            # Install into Lambda folder for packaging
            pip install -r "$LAMBDA_DIR/requirements.txt" -t "$LAMBDA_DIR/" --upgrade --no-cache-dir
            # Install into system Python so manage.py can import them during migrations
            pip install -r "$LAMBDA_DIR/requirements.txt" --upgrade --no-cache-dir
          fi

      - name: Run database migrations
        working-directory: lambda/serverless_web_app
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DJANGO_SETTINGS_MODULE: config.settings.prod
        run: python manage.py migrate --noinput

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -migrate-state -force-copy

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan \`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>
            \`\`\`hcl
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            </details>
            *Pushed by: @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform Output
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          echo "========================================"
          echo "    DEPLOYED BRANCH: ${{ env.TARGET_BRANCH }}"
          echo "========================================"
          terraform output -no-color