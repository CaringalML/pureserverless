<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Serverless Web App{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">

    <nav class="bg-slate-800 border-b border-slate-700 px-6 py-4">
        <div class="max-w-5xl mx-auto">
            <span class="text-sky-400 font-bold text-lg tracking-wide">Serverless Web App</span>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-slate-800 border-t border-slate-700 text-center py-4 text-slate-500 text-sm">
        Powered by Django &amp; AWS Lambda
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
