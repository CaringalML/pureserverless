<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}Serverless Web App{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script>
        // Send CSRF token with every HTMX request (POST, PUT, PATCH, DELETE)
        document.addEventListener('htmx:configRequest', (evt) => {
            evt.detail.headers['X-CSRFToken'] =
                document.querySelector('meta[name="csrf-token"]').content;
        });
    </script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">

    <nav class="bg-slate-800 border-b border-slate-700 px-6 py-4">
        <div class="max-w-3xl mx-auto flex items-center justify-between">
            <a href="{% url 'signin' %}" class="text-sky-400 font-bold text-lg tracking-wide">Serverless Web App</a>
            <div class="flex items-center gap-4 text-sm">
                {% if request.session.access_token %}
                    <a href="{% url 'dashboard' %}" class="text-slate-300 hover:text-sky-400 transition">Dashboard</a>
                    <a href="{% url 'signout' %}" class="text-slate-400 hover:text-slate-200 transition">Sign out</a>
                {% else %}
                    <a href="{% url 'signin' %}" class="text-slate-300 hover:text-sky-400 transition">Sign in</a>
                    <a href="{% url 'signup' %}"
                       class="bg-sky-500 hover:bg-sky-600 text-white font-semibold px-4 py-1.5 rounded-lg transition">
                        Sign up
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="flex-1 flex justify-center p-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-slate-800 border-t border-slate-700 text-center py-4 text-slate-500 text-sm">
        Powered by Django, HTMX &amp; Alpine.js on AWS Lambda
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
