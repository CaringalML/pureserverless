<div id="folder-{{ folder.pk }}"
     class="bg-slate-800 border border-slate-700 hover:border-slate-500 rounded-xl px-5 py-3.5 flex items-center gap-4 transition-all duration-150 group">

    {# Folder icon #}
    <div class="shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-yellow-400" fill="currentColor" viewBox="0 0 24 24">
            <path d="M10.414 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-6.586L10.414 3z"/>
        </svg>
    </div>

    {# Name — clicking navigates into the folder #}
    <a href="{% url 'drive_folder' folder.pk %}"
       class="flex-1 min-w-0 group-hover:text-sky-400 transition-colors duration-150">
        <p class="font-medium text-slate-100 truncate">{{ folder.name }}</p>
        <p class="text-xs text-slate-500 mt-0.5">Folder &nbsp;·&nbsp; {{ folder.created_at|date:"M d, Y" }}</p>
    </a>

    {# Actions #}
    <div class="flex items-center gap-2 shrink-0">
        <a href="{% url 'drive_folder' folder.pk %}"
           class="text-slate-400 hover:text-sky-400 transition-colors duration-150 p-1.5 rounded-lg hover:bg-slate-700"
           title="Open folder">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
            </svg>
        </a>

        <form method="post" action="{% url 'drive_delete_folder' folder.pk %}"
              hx-post="{% url 'drive_delete_folder' folder.pk %}"
              hx-target="#folder-{{ folder.pk }}"
              hx-swap="outerHTML"
              hx-confirm="Delete folder '{{ folder.name }}' and all its contents?">
            {% csrf_token %}
            <button type="submit"
                    class="text-slate-400 hover:text-red-400 transition-colors duration-150 p-1.5 rounded-lg hover:bg-slate-700"
                    title="Delete folder">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
            </button>
        </form>
    </div>
</div>
