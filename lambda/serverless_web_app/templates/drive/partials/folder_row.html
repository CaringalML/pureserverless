<div id="folder-{{ folder.pk }}"
     data-folder-pk="{{ folder.pk }}"
     class="bg-[#13151c] border rounded-xl transition-all duration-100 cursor-pointer select-none"
     :class="isSelectedFolder({{ folder.pk }}) ? 'border-sky-500 bg-sky-500/5' : 'border-zinc-700/60 hover:border-zinc-500/60'"
     @click.stop="rowClickFolder($event, {{ folder.pk }})"
     @dblclick.stop="window.location='{% url 'drive_folder' folder.pk %}'"
     @contextmenu.stop="openCtxFolder($event, {{ folder.pk }}, '{{ folder.name|escapejs }}', '{% url 'drive_folder' folder.pk %}')">

    {# ── LIST view ── #}
    <div x-show="view === 'list'" class="flex items-center gap-4 px-5 py-3.5 pointer-events-none">

        <div class="w-4 h-4 shrink-0 flex items-center justify-center">
            <div class="w-3 h-3 rounded-full border-2 transition-all duration-100"
                 :class="isSelectedFolder({{ folder.pk }}) ? 'bg-sky-500 border-sky-500' : 'border-zinc-600'"></div>
        </div>

        <div class="shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-yellow-400" fill="currentColor" viewBox="0 0 24 24">
                <path d="M10.414 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-6.586L10.414 3z"/>
            </svg>
        </div>

        <div class="flex-1 min-w-0">
            <p class="font-medium text-zinc-100 truncate text-sm">{{ folder.name }}</p>
            <p class="text-xs text-zinc-500 mt-0.5">Folder &nbsp;·&nbsp; {{ folder.created_at|date:"M d, Y" }}</p>
        </div>
    </div>

    {# ── GRID view ── #}
    <div x-show="view === 'grid'" style="display:none" class="flex flex-col p-4 gap-3 pointer-events-none">

        <div class="flex items-start justify-between">
            <div class="w-3 h-3 rounded-full border-2 mt-0.5 transition-all duration-100"
                 :class="isSelectedFolder({{ folder.pk }}) ? 'bg-sky-500 border-sky-500' : 'border-zinc-600'"></div>
        </div>

        <div class="flex justify-center py-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-14 h-14 text-yellow-400" fill="currentColor" viewBox="0 0 24 24">
                <path d="M10.414 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-6.586L10.414 3z"/>
            </svg>
        </div>

        <div class="text-center min-w-0">
            <p class="font-medium text-zinc-100 truncate text-sm">{{ folder.name }}</p>
            <p class="text-xs text-zinc-500 mt-0.5">{{ folder.created_at|date:"M d, Y" }}</p>
        </div>
    </div>

</div>
