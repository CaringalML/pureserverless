<div id="folder-{{ folder.pk }}"
     class="bg-[#13151c] border border-zinc-700/60 hover:border-zinc-500/60 rounded-xl transition-all duration-150 group"
     :class="view === 'grid' ? 'flex flex-col items-center p-4 gap-2 text-center' : 'flex items-center gap-4 px-5 py-3.5'">

    {# Folder icon #}
    <a href="{% url 'drive_folder' folder.pk %}" :class="view === 'grid' ? 'w-full flex justify-center' : 'shrink-0'">
        <svg xmlns="http://www.w3.org/2000/svg" :class="view === 'grid' ? 'w-12 h-12' : 'w-8 h-8'" class="text-yellow-400" fill="currentColor" viewBox="0 0 24 24">
            <path d="M10.414 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-6.586L10.414 3z"/>
        </svg>
    </a>

    {# Name #}
    <a href="{% url 'drive_folder' folder.pk %}"
       :class="view === 'grid' ? 'w-full' : 'flex-1 min-w-0'"
       class="group-hover:text-sky-400 transition-colors duration-150">
        <p class="font-medium text-zinc-100 truncate text-sm">{{ folder.name }}</p>
        <p class="text-xs text-zinc-500 mt-0.5">{{ folder.created_at|date:"M d, Y" }}</p>
    </a>

    {# Actions #}
    <div :class="view === 'grid' ? 'flex items-center gap-1 mt-auto' : 'flex items-center gap-2 shrink-0'">
        <a href="{% url 'drive_folder' folder.pk %}"
           class="text-zinc-400 hover:text-sky-400 transition-colors duration-150 p-1.5 rounded-lg hover:bg-zinc-700/50"
           title="Open folder">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
            </svg>
        </a>

        <form method="post" action="{% url 'drive_delete_folder' folder.pk %}"
              hx-post="{% url 'drive_delete_folder' folder.pk %}"
              hx-target="#folder-{{ folder.pk }}"
              hx-swap="outerHTML"
              hx-confirm="Delete folder '{{ folder.name }}' and all its contents?">
            {% csrf_token %}
            <button type="submit"
                    class="text-zinc-400 hover:text-red-400 transition-colors duration-150 p-1.5 rounded-lg hover:bg-zinc-700/50"
                    title="Delete folder">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
            </button>
        </form>
    </div>
</div>
