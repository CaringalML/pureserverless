<div id="item-{{ item.pk }}" class="bg-slate-800 border border-sky-500 rounded-xl px-6 py-4">
    <form hx-post="{% url 'item_update' item.pk %}"
          hx-target="#item-{{ item.pk }}"
          hx-swap="outerHTML"
          class="space-y-3">
        {% csrf_token %}
        <div>{{ form.name }}</div>
        <div>{{ form.description }}</div>
        {% if form.errors %}
        <ul class="text-red-400 text-sm space-y-1">
            {% for field in form %}{% for error in field.errors %}
            <li>{{ field.label }}: {{ error }}</li>
            {% endfor %}{% endfor %}
        </ul>
        {% endif %}
        <div class="flex gap-2 pt-1">
            <button type="submit"
                    class="bg-sky-500 hover:bg-sky-600 text-white font-semibold px-4 py-1.5 rounded-lg transition text-sm">
                Save
            </button>
            <button type="button"
                    hx-get="{% url 'item_row' item.pk %}"
                    hx-target="#item-{{ item.pk }}"
                    hx-swap="outerHTML"
                    class="bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm px-4 py-1.5 rounded-lg transition">
                Cancel
            </button>
        </div>
    </form>
</div>
