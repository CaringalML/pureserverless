<div id="item-{{ item.pk }}" class="bg-slate-800 border border-slate-700 rounded-xl px-6 py-4 flex items-center justify-between">
    <div>
        <a href="{% url 'item_detail' item.pk %}"
           class="text-lg font-semibold text-slate-100 hover:text-sky-400 transition">
            {{ item.name }}
        </a>
        {% if item.description %}
        <p class="text-slate-400 text-sm mt-0.5 truncate max-w-sm">{{ item.description }}</p>
        {% endif %}
        <p class="text-slate-500 text-xs mt-1">{{ item.created_at|date:"M d, Y" }}</p>
    </div>
    <div class="flex gap-2 ml-4 shrink-0">
        <button hx-get="{% url 'item_update' item.pk %}"
                hx-target="#item-{{ item.pk }}"
                hx-swap="outerHTML"
                class="bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm px-3 py-1.5 rounded-lg transition">
            Edit
        </button>
        <button hx-post="{% url 'item_delete' item.pk %}"
                hx-target="#item-{{ item.pk }}"
                hx-swap="outerHTML"
                hx-confirm="Delete this item?"
                class="bg-red-600 hover:bg-red-700 text-white text-sm px-3 py-1.5 rounded-lg transition">
            Delete
        </button>
    </div>
</div>
