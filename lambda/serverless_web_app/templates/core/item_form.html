{% extends "base.html" %}

{% block title %}{{ action }} Item — Serverless Web App{% endblock %}

{% block content %}
<div class="w-full max-w-lg">

    <div class="flex items-center gap-3 mb-6">
        <a href="{% url 'index' %}" class="text-slate-400 hover:text-slate-200 transition">← Back</a>
        <h1 class="text-2xl font-bold">{{ action }} Item</h1>
    </div>

    <form method="post" class="bg-slate-800 border border-slate-700 rounded-xl p-6 space-y-5">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Name</label>
            {{ form.name }}
            {% if form.name.errors %}
            <p class="text-red-400 text-sm mt-1">{{ form.name.errors.0 }}</p>
            {% endif %}
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Description</label>
            {{ form.description }}
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit"
                    class="bg-sky-500 hover:bg-sky-600 text-white font-semibold px-6 py-2 rounded-lg transition">
                {{ action }}
            </button>
            <a href="{% url 'index' %}"
               class="bg-slate-700 hover:bg-slate-600 text-slate-200 font-semibold px-6 py-2 rounded-lg transition">
                Cancel
            </a>
        </div>
    </form>

</div>
{% endblock %}
