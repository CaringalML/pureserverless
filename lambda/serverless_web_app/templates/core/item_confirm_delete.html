{% extends "base.html" %}

{% block title %}Delete {{ item.name }} — Serverless Web App{% endblock %}

{% block content %}
<div class="w-full max-w-md text-center">

    <div class="bg-slate-800 border border-red-700 rounded-xl p-8">
        <h1 class="text-2xl font-bold mb-2">Delete Item</h1>
        <p class="text-slate-400 mb-6">
            Are you sure you want to delete <span class="text-slate-100 font-semibold">{{ item.name }}</span>?
            This cannot be undone.
        </p>
        <form method="post" class="flex gap-3 justify-center">
            {% csrf_token %}
            <button type="submit"
                    class="bg-red-600 hover:bg-red-700 text-white font-semibold px-6 py-2 rounded-lg transition">
                Yes, delete
            </button>
            <a href="{% url 'index' %}"
               class="bg-slate-700 hover:bg-slate-600 text-slate-200 font-semibold px-6 py-2 rounded-lg transition">
                Cancel
            </a>
        </form>
    </div>

</div>
{% endblock %}
